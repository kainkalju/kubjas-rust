; kubjas.conf — Comprehensive example covering every configuration option.
;
; Syntax: standard INI format.
;   - Sections are job names enclosed in [brackets].
;   - Keys and values are separated by " = ".
;   - Lines starting with ; or # are comments.
;   - Multi-value keys (watch, conflicts, depends, notify-*) may be repeated.
;
; Run kubjas with:
;   kubjas --conf-file /etc/kubjas.conf --config-dir /etc/kubjas.d \
;          --log-file /var/log/kubjas.log --pid-file /var/run/kubjas.pid


; ============================================================
; [*] — Default section
; ============================================================
; Parameters defined here apply to every job in this file.
; Job-specific sections override these defaults.
; Multi-value fields (notify-*, conflicts, depends, watch)
; accumulate: job values are added on top of defaults.

[*]
; Send a failure notification to the alert handler for every job.
notify-failure = 127.0.0.1:alert-handler
; Run all jobs as an unprivileged user by default (requires kubjas as root).
user  = nobody
group = nogroup


; ============================================================
; [heartbeat-job] — Basic periodic job
; ============================================================
; Demonstrates: cmdline, interval (fixed seconds), output (file),
;               user/group override, notify-success.

[heartbeat-job]
; Full path is recommended; PATH-relative names also work.
cmdline  = /etc/kubjas.d/scripts/heartbeat.sh

; Run every 60 seconds (minimum delay between starts).
; Set to 0 to disable the job without removing it.
interval = 60

; Override the default user/group from [*].
user  = monitor
group = monitor

; Append stdout+stderr to this file (opened in append mode).
; Alternatives: "passthrough" (default) or "none".
output = /var/log/kubjas-heartbeat.log

; Notify pipeline-step-two when this job exits with code 0.
notify-success = 127.0.0.1:pipeline-step-two

; Notify a remote kubjas instance on success (cross-host chaining).
; notify-success = 192.168.1.10:remote-handler


; ============================================================
; [health-check-job] — Random interval + failure notify
; ============================================================
; Demonstrates: interval (range), notify-failure, output (passthrough).

[health-check-job]
cmdline  = /etc/kubjas.d/scripts/health-check.sh nginx

; Run every 30 to 60 seconds (randomized to spread load).
interval = 30-60

; Let output pass through to kubjas stdout / --log_file.
output = passthrough

; notify-failure is already set by [*]; add a second target here.
notify-failure = 127.0.0.1:alert-handler


; ============================================================
; [cleanup-job] — Period filter (crontab-style scheduling)
; ============================================================
; Demonstrates: interval + period to emulate cron "0 2 * * *".

[cleanup-job]
cmdline  = /etc/kubjas.d/scripts/cleanup.sh

; Poll every 60 s but the period gate will prevent early firing.
interval = 60

; Only allow execution Monday–Sunday at 02:00:00.
; Equivalent crontab: 0 2 * * *
period = hr {2} min {0} sec {0}

output = /var/log/kubjas-cleanup.log


; ============================================================
; [weekend-report-job] — Period with weekday filter
; ============================================================
; Demonstrates: period with wday scale.
; Equivalent crontab: 0 8 * * 6  (Saturday at 08:00)

[weekend-report-job]
cmdline  = /etc/kubjas.d/scripts/weekend-report.sh
interval = 60
; wday: 1=Sunday … 7=Saturday (or use sa/sat/saturday)
period   = wd {sa} hr {8} min {0} sec {0}
output   = /var/log/kubjas-reports.log


; ============================================================
; [month-end-job] — Period with mday + hour + minute + second
; ============================================================
; Demonstrates: period combining mday, hr, min, sec scales.
; Fires on days 28-31 at midnight; script decides if it is the real last day.

[month-end-job]
cmdline  = /etc/kubjas.d/scripts/month-end.sh
interval = 60
period   = md {28-31} hr {0} min {0} sec {0}
output   = /var/log/kubjas-month-end.log


; ============================================================
; [db-backup-job] — nice, ionice, conflicts
; ============================================================
; Demonstrates: nice, ionice, conflicts (mutual exclusion).

[db-backup-job]
cmdline  = /etc/kubjas.d/scripts/db-backup.sh

; Run every 6 hours.
interval = 21600

; Lower CPU priority (renice +10).
nice   = 1

; Lower I/O priority to idle class (ionice -c 3, Linux only; skipped on macOS).
ionice = 1

; Do not run if index-rebuild-job is already running (and vice versa).
conflicts = index-rebuild-job

output = /var/log/kubjas-db-backup.log


; ============================================================
; [index-rebuild-job] — conflicts (mutual exclusion, wildcard)
; ============================================================
; Demonstrates: conflicts with a named job and the wildcard form.

[index-rebuild-job]
cmdline  = /etc/kubjas.d/scripts/index-rebuild.sh
interval = 3600
nice     = 1

; Conflict with a specific named job.
conflicts = db-backup-job

; Alternatively, use * to conflict with ALL other jobs in this file
; (uncomment to make index-rebuild run exclusively):
; conflicts = *

output = /var/log/kubjas-index.log


; ============================================================
; [upload-processor] — onchange + watch (filesystem trigger)
; ============================================================
; Demonstrates: interval = onchange, watch (multiple paths),
;               cmdline with %notify% template variable.

[upload-processor]
; %notify% is replaced with the path of the file that changed.
cmdline  = /etc/kubjas.d/scripts/process-upload.sh %notify%

; "onchange" means this job only runs when a watch event fires.
interval = onchange

; Monitor one or more files/directories for write/create events.
watch = /var/spool/uploads
watch = /var/spool/imports

; Suppress output — processing results go to the script's own log.
output = none

; Only run if the prerequisite service is up.
depends = health-check-job


; ============================================================
; [config-watcher] — onchange + signal (send signal, no new process)
; ============================================================
; Demonstrates: interval = onchange, watch, signal.
; Instead of spawning a new process, kubjas sends a signal to the
; already-running job process when the watched file changes.

[config-watcher]
cmdline  = /etc/kubjas.d/scripts/reload-service.sh

; Triggered only by filesystem events on the watched path.
interval = onchange
watch    = /etc/myservice/myservice.conf

; Send SIGHUP to the running process when the file changes,
; rather than starting a new instance.
signal = HUP

output = passthrough


; ============================================================
; [pipeline-step-one] — notify-start + notify-success chaining
; ============================================================
; Demonstrates: notify-start, notify-success, fixed interval.

[pipeline-step-one]
cmdline  = /etc/kubjas.d/scripts/step-one.sh
interval = 300

; Notify a monitoring job the moment this job starts.
notify-start = 127.0.0.1:alert-handler

; Notify the next pipeline stage on success.
notify-success = 127.0.0.1:pipeline-step-two

output = /var/log/kubjas-pipeline.log


; ============================================================
; [pipeline-step-two] — success-message trigger (notify receiver)
; ============================================================
; Demonstrates: interval = success-message, cmdline with %host% %job% %notify%.

[pipeline-step-two]
; %host% = hostname of the notifying kubjas instance
; %job%  = name of the job that sent the notify
; %notify% = message type: start-message / success-message / failure-message
cmdline  = /etc/kubjas.d/scripts/step-two.sh %job%

; Only run when a success-message notify arrives.
interval = success-message

; Must not run at the same time as the backup job.
conflicts = db-backup-job

output = /var/log/kubjas-pipeline.log


; ============================================================
; [alert-handler] — failure-message trigger (notify receiver)
; ============================================================
; Demonstrates: interval = failure-message, output = none,
;               cmdline with all three template variables.

[alert-handler]
cmdline  = /etc/kubjas.d/scripts/send-alert.sh %host% %job% %notify%

; Triggered by notify-failure messages from other jobs.
interval = failure-message

; Alerts go to the script's own log; suppress kubjas passthrough.
output = none

; alert-handler should not inherit notify-failure from [*]
; (would create an infinite loop). Override with empty value:
notify-failure =


; ============================================================
; [start-message-example] — interval = start-message
; ============================================================
; Demonstrates: interval = start-message (run when another job starts).

[start-message-example]
; Runs whenever a notify-start message arrives from another job.
cmdline  = /bin/echo "Received start notify from %job% on %host%: %notify%"
interval = start-message
output   = /var/log/kubjas-start-events.log


; ============================================================
; [depends-example] — depends (run only if another job is running)
; ============================================================
; Demonstrates: depends with a named job and the wildcard form.

[depends-example]
cmdline  = /bin/echo "Running because health-check-job is active"
interval = 120

; Only execute if health-check-job is currently running.
depends = health-check-job

; Alternatively, require ALL other jobs in this file to be running:
; depends = *

output = passthrough
